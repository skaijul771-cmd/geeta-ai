<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Geeta AI</title>
</head>
<body>
  <h1>🤖 Geeta AI</h1>
  <p>Welcome to Geeta AI!</p>

  <input type="text" id="message" placeholder="अपना सवाल लिखें">
  <button onclick="reply()">Send</button>

  <p id="answer"></p>

  <script>
    

    

<script>
function reply() {
  let msg = document.getElementById("message").value.toLowerCase();
  let answer = "";

  if (msg.includes("नमस्ते") || msg.includes("hello")) {
    answer = "🙏 नमस्ते! मैं Geeta AI हूँ।";
  } else if (msg.includes("तुम कौन हो")) {
    answer = "मैं Geeta AI हूँ, आपकी मदद के लिए तैयार हूँ।";
  } else if (msg.includes("धन्यवाद")) {
    answer = "😊 आपका स्वागत है!";
  } else {
    answer = "आपने पूछा: " + msg;
  }

  document.getElementById("answer").innerText = answer;
}
</script>
