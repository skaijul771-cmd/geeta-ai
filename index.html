
<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geeta AI</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f2f2f2;
margin:0;
padding:20px;
}
.container{
max-width:500px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}
h1{
text-align:center;
color:#0066cc;
}
input{
width:100%;
padding:10px;
margin-top:10px;
}
button{
width:100%;
padding:10px;
margin-top:10px;
background:#0066cc;
color:white;
border:none;
border-radius:5px;
}
#answer{
margin-top:20px;
font-size:18px;
}
</style>
</head>

<body>

<div class="container">
<h1>🤖 Geeta AI</h1>

<input type="text" id="message" placeholder="अपना सवाल लिखें">

<button onclick="reply()">भेजें</button>

<p id="answer"></p>
</div>

<script>
function reply(){

let msg=document.getElementById("message").value.toLowerCase();

let ans="";

if(msg.includes("नमस्ते")||msg.includes("hello")){
ans="🙏 नमस्ते! मैं Geeta AI हूँ।";

}else if(msg.includes("तुम कौन हो")){
ans="मैं Geeta AI हूँ।";

}else if(msg.includes("धन्यवाद")){
ans="आपका स्वागत है। 😊";

}else{
ans="आपने पूछा: "+msg;
}

document.getElementById("answer").innerHTML=ans;

}
</script>

</body>
</html>
