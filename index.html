<link rel="stylesheet" href="style.css">
<!DOCTYPE html>
<html lang="hi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Geeta AI</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#0f172a;
    color:white;
}
header{
    background:#ff9800;
    padding:15px;
    text-align:center;
    font-size:28px;
    font-weight:bold;
}
#chat{
    height:70vh;
    overflow-y:auto;
    padding:15px;
}
.bot,.user{
    padding:12px;
    border-radius:10px;
    margin:10px 0;
    max-width:80%;
}
.bot{
    background:#1e293b;
}
.user{
    background:#2563eb;
    margin-left:auto;
}<script src="script.js"></script>
.bottom{
    display:flex;
    padding:10px;
    background:#111827;
}
input{
    flex:1;
    padding:12px;
    font-size:18px;
    border:none;
    border-radius:8px;
}
button{
    margin-left:10px;
    padding:12px 20px;
    font-size:18px;
    background:#ff9800;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>

<body>

<header>🕉️ Geeta AI</header>

<div id="chat">
  <div class="bot">
    🙏 नमस्ते! मैं Geeta AI हूँ। अपना सवाल पूछिए।
  </div>
</div>

<div class="bottom">
  <input id="msg" type="text" placeholder="अपना सवाल लिखें...">
  <button onclick="send()">भेजें</button>
</div>

<script>
function send(){

let input=document.getElementById("msg");
let chat=document.getElementById("chat");

let msg=input.value.trim();

if(msg==="") return;

chat.innerHTML += "<div class='user'>"+msg+"</div>";

let text=msg.toLowerCase();
let reply="";

if(text.includes("नमस्ते") || text.includes("hello")){
reply="🙏 नमस्ते! मैं Geeta AI हूँ।";
}
else if(text.includes("तुम कौन हो")){
reply="मैं Geeta AI हूँ, आपका AI सहायक।";
}
else if(text.includes("समय")){
reply="अभी का समय: " + new Date().toLocaleTimeString("hi-IN");
}
else if(text.includes("तारीख")){
reply="आज की तारीख: " + new Date().toLocaleDateString("hi-IN");
}
else{
reply="मैं अभी विकास के चरण में हूँ। जल्द ही GPT से जुड़कर हर सवाल का उत्तर दूँगा।";
}

chat.innerHTML += "<div class='bot'>"+reply+"</div>";

input.value="";
chat.scrollTop=chat.scrollHeight;
}

document.getElementById("msg").addEventListener("keypress",function(e){
if(e.key==="Enter"){
send();
}
});
</script>

</body>
</html>
